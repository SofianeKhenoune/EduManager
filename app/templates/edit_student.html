{% extends "base.html" %} {% block title %}Modifier l'élève | EduManager{% endblock %}
{% block content %}
<section class="panel section-block">
  <div class="section-head">
    <h1>{{ student.user.first_name }} {{ student.user.last_name }}</h1>
    <a class="btn btn-secondary" href="{{ url_for('main.students_page') }}">Retour</a>
  </div>

  <form method="post" class="form-grid">
    <label>
      Prénom *
      <input type="text" name="first_name" value="{{ student.user.first_name }}" required />
    </label>
    <label>
      Nom *
      <input type="text" name="last_name" value="{{ student.user.last_name }}" required />
    </label>
    <label>
      Email *
      <input type="email" name="email" value="{{ student.user.email }}" required />
    </label>
    <label>
      Rue *
      <input type="text" name="street" value="{{ student.street }}" required />
    </label>
    <label>
      Ville *
      <input type="text" name="city" value="{{ student.city }}" required />
    </label>
    <label>
      Code postal *
      <input type="text" name="zip_code" value="{{ student.zip_code }}" required />
    </label>
    <label>
      Date de naissance *
      <input type="date" name="birth_date" value="{{ student.birth_date.isoformat() if student.birth_date else '' }}" required />
    </label>
    <label>
      Site
      <select name="site_id">
        <option value="">Aucun</option>
        {% for site in sites %}
        <option value="{{ site.id }}" {% if student.site_id == site.id %}selected{% endif %}>
          {{ site.name }}
        </option>
        {% endfor %}
      </select>
    </label>
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Enregistrer</button>
    </div>
  </form>
</section>

<section class="panel section-block">
  <h2>Supprimer cet élève</h2>
  <form method="post" action="{{ url_for('main.delete_student', student_id=student.id) }}"
        onsubmit="return confirm('Supprimer définitivement cet élève ?')">
    <div class="form-actions">
      <button class="btn btn-danger" type="submit">Supprimer l'élève</button>
    </div>
  </form>
</section>
{% endblock %}
